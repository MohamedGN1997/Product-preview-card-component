<!DOCTYPE html>
<html dir="ltr" lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">  
        <title>Product preview card component</title>
        <!-- link of google fonts type "Montserrat" -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <!-- link of google fonts type "Fraunces" -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@700&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <!-- link of css file -->
        <link rel="stylesheet" href="./css/style.css">
    </head>    
    <body>
        <main>
            <div class="card-component">
                <div class="img-card">
                    <img src="./images/img-product-mobile.png" alt="">
                </div>
                <div class="card-content">
                    <div class="card-description">
                        <span>PERFUME</span>
                        <h2>Gabrielle Essence Eau De Parfum</h2>
                        <p>A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>
                        <div class="price">
                            <span class="current-price">$149.99</span>
                            <span class="old-price">$169.99</span>
                        </div>
                        <button class="add-to-card" title="add to card"><img src="./images/ShoppingCart.svg" alt="Cart icon"><span>Add to Cart</span></button>
                    </div>
                </div>
            </div>
        </main>
    </body>
</html>
